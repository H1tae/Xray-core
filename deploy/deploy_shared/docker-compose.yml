name: eiravpn-xray-shared

services:
  xray:
    image: ${XRAY_DOCKER_IMAGE:-eiravpn-xray:latest}
    restart: unless-stopped
    logging:
      driver: local
      options:
        max-size: "10m"
        max-file: "5"
    env_file:
      - .env
    network_mode: host
    volumes:
      - ${XRAY_CONFIG_DIR:-./configs}:/app/configs:ro
      - ./xray_entrypoint.sh:/app/deploy/xray_entrypoint.sh:ro
    entrypoint: ["/bin/sh", "/app/deploy/xray_entrypoint.sh", "run"]
